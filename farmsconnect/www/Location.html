<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demande de localisation</title>
  <link rel="icon" type="image/png" href="img/FarmsConnect.jpg"> <!-- Chemin vers votre image -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/Location.css">
  <script src="cordova.js"></script>

</head>
<body>
  <!-- Fenêtre modale pour demander la localisation -->
  <div id="myModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h3>Pourquoi avons-nous besoin de votre localisation ?</h3>
      <p>Nous avons besoin de connaître votre position géographique pour des raisons de livraison et de coordination de services. Cela nous permettra de vous fournir des services plus efficaces et adaptés à votre emplacement.</p>
      <button id="acceptBtn">Accepter</button>
      <button id="declineBtn">Refuser</button>
    </div>
  </div>

  <script>
    // Variables pour la modale et les boutons
    const modal = document.getElementById("myModal");
    const closeBtn = document.getElementsByClassName("close")[0];
    const acceptBtn = document.getElementById("acceptBtn");
    const declineBtn = document.getElementById("declineBtn");

    // Afficher la modale
    window.onload = () => {
      modal.style.display = "block";
    };

    // Fermer la modale
    closeBtn.onclick = () => {
      modal.style.display = "none";
    };





    document.addEventListener('deviceready', function () {
    // Vérifiez si le plugin est chargé correctement
    if (cordova && cordova.plugin && cordova.plugin.http) {
        console.log('Plugin avancé HTTP chargé avec succès.');

        // Vérification de la permission de géolocalisation
        cordova.plugins.diagnostic.requestLocationAuthorization(function(status) {
            if (status === cordova.plugins.diagnostic.permissionStatus.GRANTED) {
                console.log("Permission de géolocalisation accordée.");
            } else {
                console.log("Permission de géolocalisation refusée.");
            }
        }, function(error) {
            console.error("Erreur lors de la demande de permission : ", error);
        });

        // Configuration du plugin HTTP
        cordova.plugin.http.setDataSerializer('json');
        cordova.plugin.http.setServerTrustMode('nocheck', function () {
            console.log('Configuration de confiance serveur : succès');
        }, function () {
            console.error('Échec de la configuration de confiance serveur.');
        });

        // Fonction pour obtenir la localisation
        const getLocation = () => {
            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    console.log("Position obtenue :", position.coords);
                    await saveLocation(position);  // Appel de la fonction saveLocation
                },
                (error) => {
                    showError(error);  // Affichage de l'erreur en cas d'échec
                },
                {
                    enableHighAccuracy: true,
                    timeout: 40000,
                    maximumAge: 0,
                }
            );
        };

        // Fonction pour enregistrer la localisation
        async function saveLocation(position) {
            const latitude = position.coords.latitude;
            const longitude = position.coords.longitude;

            // Préparez les données à envoyer
            const data = { latitude, longitude };

            try {
                // Envoi de la requête POST avec le plugin avancé HTTP
                const response = await cordova.plugin.http.post(
                    'https://farmsconnect-b084ddb02391.herokuapp.com/api/save-location', // URL du serveur
                    data, // Données à envoyer
                    { 'Content-Type': 'application/json' } // En-têtes
                );
                
                // Si la requête est réussie, afficher un message et rediriger
                alert("Votre localisation a été enregistrée avec succès !");
                console.log("Localisation enregistrée :", JSON.parse(response.data));
                
                // Redirection vers la page d'accueil
                window.location.href = "Acceuil.html"; // Redirection
            } catch (error) {
                // Erreur de sauvegarde
                console.error("Erreur lors de l'enregistrement de la localisation :", error);
                alert("Erreur : " + (error.error || "Une erreur s'est produite."));
            }
        }

        // Ajoutez l'écouteur d'événements pour le bouton "acceptBtn"
        const acceptBtn = document.getElementById('acceptBtn');
        if (acceptBtn) {
            acceptBtn.addEventListener('click', function () {
                console.log("Le bouton a été cliqué !");
                getLocation();  // Récupérer la localisation lorsque le bouton est cliqué
            });
        }

        // Ajoutez l'écouteur d'événements pour le bouton "declineBtn"
        const declineBtn = document.getElementById('declineBtn');
        if (declineBtn) {
            declineBtn.addEventListener('click', function () {
                alert("Vous avez refusé de partager votre localisation.");
                window.location.href = "Acceuil.html"; // Redirection en cas de refus
            });
        }
    } else {
        console.error('Plugin avancé HTTP non disponible.');
    }
});
  
// Gestion des erreurs de géolocalisation
const showError = (error) => {
  switch (error.code) {
    case error.PERMISSION_DENIED:
      alert("Vous avez refusé de partager votre localisation.");
      break;
    case error.POSITION_UNAVAILABLE:
      alert("La position est indisponible. Vérifiez vos paramètres de géolocalisation, activez la localisation et votre connexion GPS.");
      break;
    case error.TIMEOUT:
      alert("La demande de géolocalisation a expiré. Essayez à nouveau.");
      break;
    default:
      alert("Une erreur inconnue s'est produite. Code d'erreur: " + error.code);
      break;
  }
  console.error("Code d'erreur de géolocalisation : " + error.code);
};


</script>
</body>
</html>
