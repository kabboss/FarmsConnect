<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demande de Localisation</title>
  <link rel="icon" type="image/png" href="img/FarmsConnect.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/Location.css">
</head>
<body>

  <div>
    <h3>Pourquoi avons-nous besoin de votre localisation ?</h3>
    <p>Nous avons besoin de connaître votre position géographique pour des raisons de livraison et de coordination de services. Cela nous permettra de vous fournir des services plus efficaces et adaptés à votre emplacement.</p>
    <button id="acceptBtn">Accepter</button>
    <button id="declineBtn">Refuser</button>
  </div>

  <script src="cordova.js"></script>
  <script src="js/index.js"></script>
  <script>
    // Variables pour les boutons
    const acceptBtn = document.getElementById("acceptBtn");
    const declineBtn = document.getElementById("declineBtn");

    // Lorsque l'utilisateur accepte, on récupère la localisation et demande son email
    acceptBtn.onclick = function() {
      // Demander à l'utilisateur de saisir son email
      const email = prompt("Veuillez entrer votre adresse email :");

      // Validation basique de l'email
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!email || !emailRegex.test(email)) {
        alert("Veuillez saisir un email valide !");
        return;
      }

      console.log("Email saisi :", email);

      // Récupérer la géolocalisation
      navigator.geolocation.getCurrentPosition(
        function(position) {
          const latitude = position.coords.latitude;
          const longitude = position.coords.longitude;
          console.log("Position récupérée : ", latitude, longitude);
          saveLocation(email, latitude, longitude);  // Sauvegarder la localisation
        },
        function(error) {
          if (error.code === error.PERMISSION_DENIED) {
            alert("Vous avez refusé de partager votre localisation.");
          } else {
            alert("Erreur lors de la récupération de la position : " + error.message);
          }
        },
        {
          enableHighAccuracy: true,
          timeout: 40000,
          maximumAge: 0
        }
      );
    };

    // Lorsque l'utilisateur refuse, on affiche un message et redirige
    declineBtn.onclick = function() {
      alert("Vous avez refusé de partager votre localisation.");
      window.location.href = 'Acceuil.html'; 
    };

    // Fonction pour sauvegarder la localisation avec l'email
    function saveLocation(email, latitude, longitude) {
      fetch('https://farmsconnect-b084ddb02391.herokuapp.com/api/save-location', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          latitude: latitude,
          longitude: longitude,
          email: email
        })
      })
      .then(response => response.json())
      .then(data => {
        console.log('Localisation enregistrée :', data);
        alert("Votre localisation a été enregistrée avec succès !");
        window.location.href = 'Acceuil.html';  // Redirection vers la page d'accueil après l'enregistrement
      })
      .catch(error => {
        console.error('Erreur lors de l\'enregistrement :', error);
        alert("Erreur : " + error.message);
      });
    }
  </script>

</body>
</html>
