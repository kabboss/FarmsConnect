<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmsConnect - Live Formation</title>
    <link rel="stylesheet" href="live.css">
</head>
<body>
    <div id="live-container">
        <h1>Live Formation - FarmsConnect</h1>
        <video id="video-stream" autoplay muted></video>
        <div id="participants"></div>
        <div id="controls">
            <input type="text" id="admin-code" placeholder="Entrez le code Admin" />
            <button id="start-live" onclick="startLive()">Démarrer le Live</button>
            <input type="text" id="user-code" placeholder="Entrez le code Utilisateur" />
            <button id="join-live" onclick="joinLive()">Rejoindre le Live</button>
            <button id="end-live" onclick="endLive()">Terminer le Live</button>
        </div>
        <div id="request-section" style="display:none;">
            <h2>Demandes pour rejoindre le live</h2>
            <div id="requests"></div>
        </div>
        <div id="chat-section" style="display:none;">
            <h2>Chat en Direct</h2>
            <div id="messages"></div>
            <input type="text" id="message-input" placeholder="Envoyer un message..." onkeypress="sendMessage(event)">
            <button onclick="sendMessageButton()">Envoyer</button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script src="live.js"></script>
</body>
</html>
