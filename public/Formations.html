<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Formation.css">
    <title>Page de Formation</title>
</head>
<body>
    <div class="container">
        <h1>Page de Formation</h1>
        <form id="uploadForm">
            <h2>Télécharger des fichiers de formation</h2>
            <input type="file" name="video" accept="video/*" required>
            <input type="file" name="audio" accept="audio/*" required>
            <input type="password" id="password" placeholder="Mot de passe" required>
            <button type="submit">Télécharger</button>
        </form>

        <div id="commentsSection">
            <h2>Commentaires</h2>
            <div id="comments"></div>
            <form id="commentForm">
                <input type="text" id="username" placeholder="Votre nom" required>
                <textarea id="commentText" placeholder="Votre commentaire" required></textarea>
                <button type="submit">Envoyer</button>
            </form>
        </div>
    </div>

    <script src="Formation.js"></script>
</body>
</html>
