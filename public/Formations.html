<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page de Formation - FarmsConnect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Gestion des Vidéos de Formation</h1>
        </header>
        <main>
            <section id="uploadSection">
                <h2>Importer une Vidéo</h2>
                <input type="file" id="videoUpload" accept="video/*">
                <input type="password" id="accessCode" placeholder="Entrez le code d'accès">
                <button id="uploadButton">Importer</button>
            </section>
            <section id="videoListSection">
                <h2>Vidéos Importées</h2>
                <ul id="videoList"></ul>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
