<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formation en ligne</title>
    <link rel="stylesheet" href="Formation.css">
</head>
<body>
    <header>
        <h1>Bienvenue dans notre formation</h1>
        <nav>
            <a href="#videoSection">Vidéos</a>
            <a href="#chatSection">Chat</a>
        </nav>
    </header>

    <!-- Section des vidéos -->
    <section id="videoSection">
        <h2>Nos vidéos de formation</h2>
        <div class="video-container">
            <div class="video">
                <iframe width="560" height="315" src="https://www.youtube.com/embed/WlHuUfhEQM0?si=W_TBFL0EHIy8v_LY" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                <p>Formation 1</p>
            </div>
            <div class="video">
                <iframe width="560" height="315" src="https://www.youtube.com/embed/eLkEYenv6aI?si=XKL8XRATdPDf7Gan&amp;controls=0" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                <p>Formation 2</p>
            </div>
        </div>
    </section>

    <!-- Section des commentaires -->
    <section id="commentSection">
        <h2>Commentaires</h2>
        <form action="/comment" method="POST">
            <input type="text" name="username" placeholder="Ton nom" required>
            <textarea name="message" placeholder="Ton commentaire" required></textarea>
            <button type="submit">Ajouter un commentaire</button>
        </form>
        <ul id="comments-list">
            <% comments.forEach(comment => { %>
                <li>
                    <strong><%= comment.username %></strong>: <%= comment.message %>
                </li>
            <% }); %>
        </ul>
    </section>

    <!-- Section de Chat en Temps Réel -->
    <section id="chatSection">
        <h2>Chat en direct</h2>
        <div id="chat-box"></div>
        <input id="chat-input" type="text" placeholder="Écrire un message...">
        <button id="send-btn">Envoyer</button>
    </section>

    <script src="/js/app.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        document.getElementById('send-btn').addEventListener('click', () => {
            const msg = document.getElementById('chat-input').value;
            socket.emit('chat message', msg);
            document.getElementById('chat-input').value = ''; // Clear input
        });

        socket.on('chat message', (msg) => {
            const chatBox = document.getElementById('chat-box');
            const messageElem = document.createElement('div');
            messageElem.textContent = msg;
            chatBox.appendChild(messageElem);
        });
    </script>
</body>
</html>
