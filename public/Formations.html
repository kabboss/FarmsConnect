<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Formation</title>
    <link rel="stylesheet" href="Formation.css">

</head>
<body>
    <div id="container">
        <h1>Live Formation</h1>

        <!-- Section pour l’administrateur -->
        <div id="adminSection">
            <input type="password" id="adminPassword" placeholder="Mot de passe admin">
            <button id="startAdminStream">Démarrer le Live</button>
            <button id="stopAdminStream" style="display: none;">Arrêter le Live</button>
        </div>

        <!-- Section vidéo pour les spectateurs -->
        <div id="videoSection">
            <video id="liveVideo" autoplay playsinline controls></video>
            <p id="status">En attente du live...</p>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="Formation.js"></script>
</body>
</html>
