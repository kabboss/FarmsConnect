<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidéos de Formation</title>
</head>
<body>
    <h1>Vidéos de Formation</h1>
    <ul id="videoList">
        <!-- La liste des vidéos sera générée ici -->
    </ul>

    <video id="videoPlayer" controls width="640" height="360" style="display:none;">
        <source id="videoSource" src="" type="video/mp4">
    </video>

    <script>
        // Liste des vidéos disponibles (vous pouvez adapter ceci pour générer dynamiquement)
        const videos = ["F1.mp4", "F2.mp4"];

        // Créer les éléments de liste pour chaque vidéo
        const videoList = document.getElementById('videoList');
        videos.forEach(video => {
            const listItem = document.createElement('li');
            listItem.textContent = video;
            listItem.style.cursor = "pointer";
            listItem.onclick = () => playVideo(video);
            videoList.appendChild(listItem);
        });

        // Fonction pour jouer la vidéo sélectionnée
        function playVideo(video) {
            const videoPlayer = document.getElementById('videoPlayer');
            const videoSource = document.getElementById('videoSource');
            videoSource.src = `/video/${video}`;
            videoPlayer.style.display = "block";
            videoPlayer.load();
            videoPlayer.play();
        }
    </script>
</body>
</html>
