<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Formation - FarmsConnect</title>
    <link rel="stylesheet" href="Formation.css">
</head>
<body>
    <div id="container">
        <h1>Live Formation</h1>

        <!-- Section pour l’administrateur -->
        <div id="adminSection">
            <h2>Admin - Démarrer le Live</h2>
            <input type="password" id="adminPassword" placeholder="Mot de passe admin">
            <button id="startAdminStream">Démarrer le Live</button>
        </div>

        <!-- Section vidéo -->
        <div id="videoSection">
            <video id="liveVideo" autoplay playsinline></video>
            <p id="status">En attente du démarrage du live...</p>
        </div>

        <!-- Chat en direct -->
        <div id="chatSection">
            <h2>Chat en Direct</h2>
            <div id="chatMessages"></div>
            <input type="text" id="chatInput" placeholder="Tapez votre message">
            <button id="sendChat">Envoyer</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="Formation.js"></script>
</body>
</html>
