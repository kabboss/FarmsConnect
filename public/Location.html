<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demande de localisation</title>
  <link rel="stylesheet" href="Location.css">

</head>
<body>

  <!-- Fenêtre modale pour demander la localisation -->
  <div id="myModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h3>Pourquoi avons-nous besoin de votre localisation ?</h3>
      <p>Nous avons besoin de connaître votre position géographique pour des raisons de livraison et de coordination de services. Cela nous permettra de vous fournir des services plus efficaces et adaptés à votre emplacement.</p>
      <button id="acceptBtn">Accepter</button>
      <button id="declineBtn">Refuser</button>
    </div>
  </div>

  <script>
    // Fonction pour afficher la modale
    window.onload = function() {
      showModal(); // Afficher la modale dès que la page est chargée
    }

    var modal = document.getElementById("myModal");
    var span = document.getElementsByClassName("close")[0];
    var acceptBtn = document.getElementById("acceptBtn");
    var declineBtn = document.getElementById("declineBtn");
    var content = document.getElementById("content");

    // Afficher la modale
    function showModal() {
      modal.style.display = "block"; 
    }

    // Quand l'utilisateur clique sur "X", fermer la modale
    span.onclick = function() {
      modal.style.display = "none";
      showPageContent();
    }

    // Si l'utilisateur accepte la localisation
    acceptBtn.onclick = function() {
      modal.style.display = "none"; // Fermer la modale
      getLocation(); // Récupérer la localisation
      showPageContent(); // Afficher le contenu de la page
    }

    // Si l'utilisateur refuse la localisation
    declineBtn.onclick = function() {
      modal.style.display = "none"; // Fermer la modale
      alert("Vous avez refusé de partager votre localisation.");
      showPageContent(); // Afficher le contenu de la page
    }

    // Fonction pour récupérer la localisation
    function getLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(saveLocation, showError);
      } else {
        alert("La géolocalisation n'est pas supportée par votre navigateur.");
      }
    }

    // Fonction pour sauvegarder la localisation
    function saveLocation(position) {
      var latitude = position.coords.latitude;
      var longitude = position.coords.longitude;

      // Stocker les coordonnées dans une variable dynamique
      var userId = User._id;  // Utiliser l'ID de l'utilisateur
      var locationKey = "location_" + userId;
      var locationData = { latitude: latitude, longitude: longitude };

      // Log des données pour vérifier
      console.log(locationKey, locationData);

      // Envoi des données au serveur via AJAX (Remplacez l'URL avec celle de votre serveur)
      sendLocationToServer(locationKey, locationData);
    }

    // Fonction pour envoyer la localisation au serveur
function sendLocationToServer(locationKey, locationData) {
  fetch('https://farmsconnect-b084ddb02391.herokuapp.com/api/save-location', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      username: locationKey,  // Utilisez l'identifiant de l'utilisateur
      latitude: locationData.latitude,
      longitude: locationData.longitude
    })
  })
  .then(response => response.json())
  .then(data => {
    console.log('Localisation envoyée:', data);
    alert('Votre localisation a été envoyée avec succès !');
  })
  .catch(error => {
    console.error('Erreur lors de l\'envoi de la localisation:', error);
  });
}

    // Fonction pour afficher un message d'erreur si la localisation échoue
    function showError(error) {
      switch (error.code) {
        case error.PERMISSION_DENIED:
          alert("Vous avez refusé de partager votre localisation.");
          break;
        case error.POSITION_UNAVAILABLE:
          alert("La position est indisponible.");
          break;
        case error.TIMEOUT:
          alert("La demande de géolocalisation a expiré.");
          break;
        case error.UNKNOWN_ERROR:
          alert("Erreur inconnue lors de la récupération de la localisation.");
          break;
      }
    }

    // Afficher le contenu de la page après la réponse
    function showPageContent() {
      content.style.display = "block"; // Afficher le contenu
    }
  </script>

</body>
</html>
