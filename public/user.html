<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Utilisateur - Diffusion en Direct</title>
    <style> video { width: 100%; max-width: 600px; margin-bottom: 20px; } </style>
</head>
<body>
    <h1>Interface Utilisateur</h1>
    <video id="userVideo" autoplay></video>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let peerConnection;
        const configuration = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        socket.on('offer', async (offer) => {
            peerConnection = new RTCPeerConnection(configuration);

            // Gestion des candidats ICE
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('candidate', event.candidate);
                }
            };

            // Recevoir le flux distant
            peerConnection.ontrack = (event) => {
                const video = document.getElementById('userVideo');
                if (video.srcObject !== event.streams[0]) {
                    video.srcObject = event.streams[0];
                }
            };

            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('answer', answer);
        });

        // Recevoir les candidats ICE de l'admin
        socket.on('candidate', (candidate) => {
            peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
        });

        // Fin de la diffusion
        socket.on('liveEnded', () => {
            alert("Le live est terminé.");
            const video = document.getElementById('userVideo');
            video.srcObject = null;
        });
    </script>
</body>
</html>
