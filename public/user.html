<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Utilisateur - Live</title>
    <style>
        video { width: 100%; max-width: 500px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>Interface Utilisateur</h1>
    <video id="liveVideo" controls autoplay muted></video>
    <button onclick="requestToJoin('video')">Demander à rejoindre en vidéo</button>
    <button onclick="requestToJoin('audio')">Demander à rejoindre en audio</button>

    <h2>Chat</h2>
    <input type="text" id="message" placeholder="Tapez votre message">
    <button onclick="sendMessage()">Envoyer</button>
    <div id="chat"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        socket.on('receiveAdminStream', (streamData) => {
            const video = document.getElementById('liveVideo');
            video.src = streamData;
            video.play();
        });

        // Demander à rejoindre le live
        function requestToJoin(mode) {
            const username = prompt("Entrez votre nom:");
            if (username) {
                socket.emit('requestToJoin', { username, mode });
            } else {
                alert("Nom requis pour faire une demande.");
            }
        }

        // Recevoir une approbation pour rejoindre
        socket.on('joinApproved', () => {
            alert("Vous avez été approuvé pour rejoindre le live !");
            startUserStream();
        });

        // Commencer la diffusion utilisateur
        async function startUserStream() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                socket.emit('userStream', stream);
            } catch (error) {
                console.error("Erreur d'accès à la caméra ou au micro :", error);
            }
        }

        // Chat
        function sendMessage() {
            const message = document.getElementById('message').value;
            if (message.trim() !== "") {
                socket.emit('sendMessage', message);
                document.getElementById('message').value = "";
            }
        }

        socket.on('receiveMessage', (message) => {
            const chatDiv = document.getElementById('chat');
            const messageEl = document.createElement('p');
            messageEl.textContent = message;
            chatDiv.appendChild(messageEl);
        });

        // Fin du live
        socket.on('liveEnded', () => {
            alert("Le live est terminé.");
        });
    </script>
</body>
</html>
