<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Utilisateur - Live</title>
    <style>
        video { width: 100%; max-width: 600px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>Interface Utilisateur</h1>
    <video id="liveVideo" controls autoplay muted></video>
    <button onclick="requestToJoin('video')">Demander à rejoindre en vidéo</button>
    <button onclick="requestToJoin('audio')">Demander à rejoindre en audio</button>
    <button onclick="quitLive()">Quitter le live</button>

    <h2>Chat</h2>
    <input type="text" id="message" placeholder="Tapez votre message">
    <button onclick="sendMessage()">Envoyer</button>
    <div id="chat"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let localStream;

        // Recevoir le flux de l'admin (vidéo uploadée ou flux en direct)
        socket.on('receiveAdminStream', (streamData) => {
            const video = document.getElementById('liveVideo');
            video.srcObject = new MediaStream(streamData);
            video.play();
        });

        // Demander à rejoindre le live
        function requestToJoin(mode) {
            const username = prompt("Entrez votre nom:");
            socket.emit('requestToJoin', username, mode);
        }

        // Recevoir une approbation pour rejoindre
        socket.on('joinApproved', () => {
            alert("Vous avez été approuvé pour rejoindre le live !");
            startUserStream();
        });

        // Démarrer le flux de l'utilisateur
        async function startUserStream() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                socket.emit('userStream', localStream.getTracks()); // Envoyer le flux de l'utilisateur
            } catch (error) {
                console.error("Erreur d'accès à la caméra ou au micro :", error);
            }
        }

        // Quitter le live
        function quitLive() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            window.location.href = "Acceuil.html"; // Rediriger vers la page d'accueil
        }

        // Chat
        function sendMessage() {
            const message = document.getElementById('message').value;
            socket.emit('sendMessage', message);
            document.getElementById('message').value = "";
        }

        socket.on('receiveMessage', (message) => {
            const chatDiv = document.getElementById('chat');
            const messageEl = document.createElement('p');
            messageEl.textContent = message;
            chatDiv.appendChild(messageEl);
        });
    </script>
</body>
</html>
