<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin - Diffusion en Direct</title>
</head>
<body>
    <h1>Interface Admin</h1>
    <video id="adminVideo" autoplay muted></video>
    <input type="file" id="uploadVideo" accept="video/*">
    <button onclick="uploadAndStreamVideo()">Uploader et Diffuser la Vidéo</button>
    <button onclick="startLiveStream()">Démarrer le live avec la caméra</button>
    
    <h2>Demandes des Utilisateurs</h2>
    <div id="requests"></div>
    
    <h2>Chat</h2>
    <input type="text" id="message" placeholder="Tapez votre message">
    <button onclick="sendMessage()">Envoyer</button>
    <div id="chat"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let localStream;

        // Démarrer la diffusion depuis la caméra
        async function startLiveStream() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('adminVideo').srcObject = localStream;
                const streamData = localStream.getTracks().map(track => track);
                socket.emit('adminStream', streamData);
            } catch (error) {
                console.error("Erreur d'accès à la caméra ou au micro :", error);
            }
        }

        // Uploader et diffuser une vidéo
        function uploadAndStreamVideo() {
            const videoFile = document.getElementById('uploadVideo').files[0];
            const videoElement = document.getElementById('adminVideo');
            const videoUrl = URL.createObjectURL(videoFile);
            videoElement.src = videoUrl;
            videoElement.play();
            socket.emit('adminStream', videoUrl);  // Envoyer l'URL de la vidéo uploadée
        }

        // Accepter une demande de rejoindre
        function acceptRequest(userId) {
            socket.emit('acceptRequest', userId);
        }

        // Afficher les demandes de rejoindre
        socket.on('newJoinRequest', (requests) => {
            const requestsDiv = document.getElementById('requests');
            requestsDiv.innerHTML = "";
            requests.forEach(req => {
                const requestEl = document.createElement('div');
                requestEl.innerHTML = `${req.username} demande à rejoindre en ${req.mode}`;
                const acceptBtn = document.createElement('button');
                acceptBtn.textContent = "Accepter";
                acceptBtn.onclick = () => acceptRequest(req.id);
                requestEl.appendChild(acceptBtn);
                requestsDiv.appendChild(requestEl);
            });
        });

        // Recevoir le flux des utilisateurs et l'afficher
        socket.on('receiveUserStream', ({ userId, streamData }) => {
            const userVideo = document.createElement('video');
            userVideo.srcObject = new MediaStream(streamData);
            userVideo.autoplay = true;
            userVideo.style.width = '150px';
            document.body.appendChild(userVideo);
        });

        // Chat
        function sendMessage() {
            const message = document.getElementById('message').value;
            socket.emit('sendMessage', message);
            document.getElementById('message').value = "";
        }

        socket.on('receiveMessage', (message) => {
            const chatDiv = document.getElementById('chat');
            const messageEl = document.createElement('p');
            messageEl.textContent = message;
            chatDiv.appendChild(messageEl);
        });
    </script>
</body>
</html>
