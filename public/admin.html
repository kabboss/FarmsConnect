<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin - Diffusion en Direct</title>
    <style> video { width: 100%; max-width: 600px; margin-bottom: 20px; } </style>
</head>
<body>
    <h1>Interface Admin</h1>
    <video id="adminVideo" autoplay muted></video>
    <button onclick="startLiveStream()">Démarrer le live</button>
    <button onclick="endLive()">Terminer le live</button>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let localStream;
        let peerConnection;
        const configuration = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        async function startLiveStream() {
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('adminVideo').srcObject = localStream;

        peerConnection = new RTCPeerConnection(configuration);

        // Vérification des pistes ajoutées
        localStream.getTracks().forEach(track => {
            peerConnection.addTrack(track, localStream);
            console.log("Piste ajoutée :", track);
        });

        peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
                socket.emit('candidate', event.candidate);
                console.log("Candidat ICE envoyé :", event.candidate);
            }
        };

        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        console.log("Offre envoyée :", offer);
        socket.emit('offer', offer);

    } catch (error) {
        console.error("Erreur de démarrage du flux :", error);
    }
}

socket.on('answer', async (answer) => {
    console.log("Réponse reçue :", answer);
    await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
});

socket.on('candidate', (candidate) => {
    console.log("Candidat ICE reçu :", candidate);
    peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
});


        function endLive() {
            if (peerConnection) {
                peerConnection.close();
            }
            socket.emit('endLive');
        }
    </script>
</body>
</html>
