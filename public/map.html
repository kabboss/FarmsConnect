<!DOCTYPE html>
<html>
<head>
  <title>Carte des Utilisateurs</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
  <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    #map {
      height: 600px;
      width: 100%;
    }
    .legend {
      background: white;
      padding: 10px;
      border-radius: 5px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
      position: absolute;
      bottom: 10px;
      left: 10px;
      z-index: 1000;
    }
    .legend h4 {
      margin: 0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h2>Carte des Vendeurs, Éleveurs et Vétérinaires</h2>
  <div id="map"></div>

  <script>
    const map = L.map('map').setView([12.3404288, -1.5106048], 13);

    // Charger la carte
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let userMarker, routeControl;
    let userLat, userLng;

    // Icônes personnalisées
    const userIcons = {
      vendeur: L.icon({ iconUrl: 'seller-icon.png', iconSize: [30, 30] }),
      eleveur: L.icon({ iconUrl: 'breeder-icon.png', iconSize: [30, 30] }),
      veterinaire: L.icon({ iconUrl: 'vet-icon.png', iconSize: [30, 30] }),
      utilisateur: L.icon({ iconUrl: 'user-icon.png', iconSize: [30, 30] })
    };

    // Fonction pour mettre à jour la position de l'utilisateur
    function updateUserLocation() {
      navigator.geolocation.watchPosition(
        position => {
          userLat = position.coords.latitude;
          userLng = position.coords.longitude;

          if (!userMarker) {
            userMarker = L.marker([userLat, userLng], { icon: userIcons.utilisateur })
              .addTo(map)
              .bindPopup('Vous êtes ici');
          } else {
            userMarker.setLatLng([userLat, userLng]);
          }
          map.setView([userLat, userLng], 13);

          if (routeControl) {
            calculateRoute(userLat, userLng, routeControl.getWaypoints()[1].latLng.lat, routeControl.getWaypoints()[1].latLng.lng);
          }
        },
        err => console.error('Erreur de géolocalisation:', err),
        { enableHighAccuracy: true }
      );
    }

    updateUserLocation();

    // Charger les utilisateurs depuis l'API
    axios.get('/api/map')
      .then(response => {
        const data = response.data;
        const displayedEmails = new Set();

        data.forEach(user => {
          const { username, email, userType, location } = user;
          if (location && !displayedEmails.has(email)) {
            const [lng, lat] = location.coordinates;

            const marker = L.marker([lat, lng], { icon: userIcons[userType] }).addTo(map);
            marker.bindPopup(`
              <b>${username}</b><br>${userType}<br>
              <button onclick="calculateRoute(${userLat}, ${userLng}, ${lat}, ${lng})">Voir l'itinéraire</button>
              <button onclick="clearRoute()">Réinitialiser l'itinéraire</button>
            `);

            displayedEmails.add(email);
          }
        });
      })
      .catch(err => console.error('Erreur lors du chargement des données:', err));

    // Calculer l'itinéraire
    function calculateRoute(startLat, startLng, destLat, destLng) {
      if (routeControl) map.removeControl(routeControl);

      routeControl = L.Routing.control({
        waypoints: [L.latLng(startLat, startLng), L.latLng(destLat, destLng)],
        routeWhileDragging: true,
        showAlternatives: true
      }).addTo(map);
    }

    function clearRoute() {
      if (routeControl) {
        map.removeControl(routeControl);
        routeControl = null;
      }
    }
  </script>
</body>
</html>
